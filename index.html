    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3EV0RZHYDN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;

      const PERIOVOX_GA_ID = 'G-3EV0RZHYDN';
      const PERIOVOX_COOKIE_CONSENT_KEY = 'periovox-cookie-consent';

      function periovoxReadConsent() {
        try {
          const rawConsent = window.localStorage.getItem(PERIOVOX_COOKIE_CONSENT_KEY);

          if (!rawConsent) {
            return { analytics: false, advertising: false, preferences: false };
          }

          const parsedConsent = JSON.parse(rawConsent);

          return {
            analytics: Boolean(parsedConsent && parsedConsent.analytics),
            advertising: Boolean(parsedConsent && parsedConsent.advertising),
            preferences: Boolean(parsedConsent && parsedConsent.preferences),
          };
        } catch (error) {
          return { analytics: false, advertising: false, preferences: false };
        }
      }

      function periovoxApplyGoogleConsent(consent) {
        gtag('consent', 'default', {
          analytics_storage: consent.analytics ? 'granted' : 'denied',
          ad_storage: consent.advertising ? 'granted' : 'denied',
          ad_user_data: consent.advertising ? 'granted' : 'denied',
          ad_personalization: consent.advertising ? 'granted' : 'denied',
          functionality_storage: consent.preferences ? 'granted' : 'denied',
          personalization_storage: consent.preferences ? 'granted' : 'denied',
          security_storage: 'granted',
        });
      }

      window.__periovoxGaInitialized = false;
      window.__periovoxInitGA = function __periovoxInitGA() {
        if (window.__periovoxGaInitialized) {
          return;
        }

        window['ga-disable-' + PERIOVOX_GA_ID] = false;
        gtag('js', new Date());
        gtag('config', 'G-3EV0RZHYDN');
        window.__periovoxGaInitialized = true;
      };

      const periovoxConsent = periovoxReadConsent();
      window['ga-disable-' + PERIOVOX_GA_ID] = !periovoxConsent.analytics;
      periovoxApplyGoogleConsent(periovoxConsent);

      if (periovoxConsent.analytics) {
        window.__periovoxInitGA();
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
